syntax = "proto3";
package GameFrameSync;

enum MessageType
{
  FrameSync = 0;
  ACK = 2;
}
message ResFrameSyncData
{
  int32 frameId = 1;
  repeated ResFrameInputData playersFrameInputData = 2;
  ReqFrameInputData reqFrameInputData = 3;
  MessageType messageType = 6;
  string roomCode = 7;
}
message ReqFrameSyncData
{
  int32 frameId = 1;
  ReqFrameInputData reqFrameInputData = 3;
  MessageType messageType = 6;
  string roomCode = 7;
}
message ReqFrameInputData
{
  int32 frameId = 1;
  int32 OwnerPlayerId = 2;
  int32 inputType = 3;
  Vector2D position = 4;
  Vector2D moveVector = 8;
}

message ResFrameInputData
{
  int32 frameId = 1;
  int32 OwnerPlayerId = 2;
  int32 inputType = 3;
  Vector2D position = 4;
  Vector2D moveVector = 8;
}
message Vector3D
{
  sint32 x = 1;
  sint32 y = 2;
  sint32 z = 3;
}
message Vector2D
{
  sint32 x = 1;
  sint32 y = 2;
}

