syntax = "proto3";
package GameFrameSync;

enum MessageType
{
  FrameSync = 0;
  checksum=1;
  ACK = 2;
  dismatch=3;
}
message ResDesync
{
  int32 frameId = 1;
}
message ResFrameSyncData
{
  int32 frameId = 1;
  repeated ResFrameInputData playersFrameInputData = 2;
  ReqFrameInputData reqFrameInputData = 3;
  ResDesync Desync=4;
  MessageType messageType = 6;
  string roomCode = 7;
}
message ReqChecksum
{
  int32 frameId = 1;
  int32 seatIndex = 2;
  uint64 checksumValue = 3;
}
message ReqFrameSyncData
{
  int32 frameId = 1;
  ReqChecksum Checksum=2;
  ReqFrameInputData reqFrameInputData = 3;
  MessageType messageType = 6;
  string roomCode = 7;
}
message ReqFrameInputData
{
  int32 frameId = 1;
  int32 seatIndex = 2;
  int32 inputType = 3;
  Vector2D position = 4;
  Vector2D moveVector = 8;
}

message ResFrameInputData
{
  int32 frameId = 1;
  int32 seatIndex = 2;
  int32 inputType = 3;
  Vector2D position = 4;
  Vector2D moveVector = 8;
}
message Vector3D
{
  sint32 x = 1;
  sint32 y = 2;
  sint32 z = 3;
}
message Vector2D
{
  sint32 x = 1;
  sint32 y = 2;
}

