syntax = "proto3";
package GameFrameSync;

enum InputType
{
  None = 0;
  move=2;
  Swap=3;
  IncisivePass=4;
  ShortPass=5;
  LongPass=6;
  SHOOT_PRESS=7;
  SHOOT_RELEASE=8;
  Pause=9;
}

enum MessageType
{
  FrameSync = 0;
  ACK = 2;
}
message ResFrameSyncData
{
  int32 frameId = 1;
  repeated ResFrameInputData playersFrameInputData = 2;
  ReqFrameInputData reqFrameInputData = 3;
  MessageType messageType = 6;
  string roomCode = 7;
}
message ReqFrameSyncData
{
  int32 frameId = 1;
  ReqFrameInputData reqFrameInputData = 3;
  MessageType messageType = 6;
  string roomCode = 7;
}
message ReqFrameInputData
{
  int32 frameId = 1;
  int32 playerId = 2;
  InputType inputType = 3;
  Vector2D position = 4;
  Vector2D moveVector = 8;
  int32 activeUnitIndex=9;
  int32 commandIndex=10;
}

message ResFrameInputData
{
  int32 frameId = 1;
  int32 playerId = 2;
  InputType inputType = 3;
  Vector2D position = 4;
  Vector2D moveVector = 8;
  int32 activeUnitIndex=9;
  int32 commandIndex=10;
}
message Vector3D
{
  float x = 1;
  float y = 2;
  float z = 3;
}
message Vector2D
{
  float x = 1;
  float y = 2;
}

