syntax = "proto3";
package SocketProtocol;

enum RequestCode
{
  RequestNone = 0;
  User = 1;
  HeartBeat = 2;
  Room = 3;
  Game = 4;
}

enum ResponseCode
{
  ResponseNone = 0;
  UserResponse = 1;
  HeartBeatResponse = 2;
  RoomResponse = 3;
}

enum ActionCode
{
  ActionNone = 0;
  SignIn = 1;
  SignUp = 2;
  CreateRoom = 3;
  SearchRoom = 4;
  AssignClient = 5;
  JoinRoom = 6;
  PlayerConfirmCountry = 7;
  PlayerSelectCountry=8;
  QuitRoom = 9;
  StartGame = 10;
  FinishOperation = 11;
  ReadyStartGame = 12;
  UpdatePlayerCoin = 13;
  LoadGameSceneComplete = 14;
  ChangeGameState = 15;
  ChangeRound =16;
  ChangeOperation = 17;
  SetGameOver = 18;
  OnTimeSync=19;
}

enum RoomMatchType
{
  None=0;
  Training=1;
  TrainingWithEnemy=2;
  UltimateTeam=3;
}

enum ReturnCode
{
  ReturnNone = 0;
  Success = 1;
  Fail = 2;
}

enum GameState
{
  NotStarted = 0;
  IN_PLAY = 1;
  SCORED = 2;
  RESET = 3;
  KICKOFF = 4;
  OVERTIME=5;
  GAMEOVER=6;
}

message HeartbeatPack
{
  bool triggered = 1;
  // PING 或 PONG
  string type = 2;
  // 时间戳
  int64 timestamp = 3;
}

message MainPack
{
  HeartbeatPack heartbeat = 1;

  RequestCode requestCode = 2;
  ResponseCode responseCode = 3;
  ActionCode actionCode = 4;
  ReturnCode returnCode = 5;

  SignInPack signInPack = 6;
  SignUpPack signUpPack = 7;
  PlayerInfoPack playerInfoPack = 8;

  ReturnMessage returnMessage = 9;

  ClientPack clientPack = 10;

  CreateRoomPack createRoomPack = 11;
  RoomInfoPack roomInfoPack = 13;
  SearchRoomResultPack searchRoomResultPack = 14;
  RoomPlayerConfirmCountryPack roomPlayerConfirmCountryPack = 15;
  RoomPlayerSelectCountryPack RoomPlayerSelectCountryPack=16;
  JoinRoomResultPack joinRoomResultPack = 17;
  RoomPlayerInfoPack roomPlayerInfoPack = 18;
  FinishOperationPack finishOperationPack = 19;
  PlayerScoreBoardPack playerScoreBoardPack = 20;
  RoundPack roundPack = 21;
  ChangeOperationPack changeOperationPack = 22;
  GameOverPack gameOverPack = 23;
  GameState currentGameState = 24;
  repeated int32 recipeIdArray = 25;
  int32 deliverRecipeId = 26;
  SyncTimePack syncTimePack=27;
  SyncTimeForOffsetPack syncTimeForOffsetPack=28;
}

message PlayerCoinPack
{
  int32 coin = 1;
}

message SignInPack
{
  string username = 1;
  string password = 2;
}

message SignUpPack
{
  string username = 1;
  string password = 2;
  string nickname = 3;
}

message CreateRoomPack
{
  string roomName = 2;
  RoomMatchType roomMatchType = 3;
  int32 maxPlayer = 4;
}

message RoomInfoPack
{
  string roomCode = 1;
  string roomName = 2;
  RoomMatchType roomMatchType = 3;
  int32 currentPlayers = 4;
  int32 maxPlayer = 5;
}
message SyncTimeForOffsetPack
{
  int64 clientSendTime = 1;
  int64 serverTime = 2;
}
message SyncTimePack
{
  int64 startTime = 1;
  int32 startFrame = 2;
}
message SearchRoomResultPack
{
  repeated RoomInfoPack roomInfoList = 1;
}

message JoinRoomResultPack
{
  repeated RoomPlayerInfoPack roomPlayerInfoList = 1;
}

message RoomPlayerConfirmCountryPack
{
  string selectCountry=2;
}
message RoomPlayerSelectCountryPack
{
  int32 countryIndex = 1;
  string countryName=2;
}

message PlayerInfoPack
{
  int32 id = 1;
  string username = 2;
  string nickname = 3;
}
message RoomPlayerInfoPack
{
  int32 id = 1;
  int32 seatIndex=2;
  string username = 3;
  string nickname = 4;
  bool ready = 5;
}
message FinishOperationPack
{
  repeated int32 totalScore = 1;
  int32 operationLeft = 2;
}

message ChangeOperationPack
{
  int32 currentOperationPlayerId = 1;
  int32 operationLeft = 2;
}

message PlayerScoreBoardPack
{
  int32 playerId = 1;
  int32 operationLeft = 2;
  repeated int32 scoreArray = 3;
}

message RoundPack
{
  int32 currentRound = 1;
  int32 operationPlayerId = 2;
  string message = 3;
}

message GameOverPack
{
  repeated PlayerScorePack playerScorePack = 1;
}

message PlayerScorePack
{
  int32 playerId = 1;
  repeated int32 scoreArray = 2;
}

message ClientPack
{
  int32 clientId = 1;
  //	string clientIp = 2;
  int32 udpListenPort = 3;
}

message ReturnMessage
{
  string errorMessage = 1;
  string successMessage = 2;
}